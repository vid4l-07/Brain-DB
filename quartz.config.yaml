# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: Brain DB
  pageTitleSuffix: ""
  enableSPA: false
  enablePopovers: true
  analytics:
    provider: plausible
  locale: en-US
  baseUrl: vid4l-07.github.io/Brain-DB
  ignorePatterns:
    - private
    - templates
    - .obsidian
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Schibsted Grotesk
      body: Source Sans Pro
      code: IBM Plex Mono
    colors:
      lightMode:
        light: "#f2f1f5"
        lightgray: "#e5e9f0"
        gray: "#c4c2cd"
        darkgray: "#4a4950"
        dark: "#4a4950"
        secondary: "#7090b0"
        tertiary: "#8c72b0"
        highlight: rgba(115, 122, 126, 0.15)
        textHighlight: "#c85d6588"
      darkMode:
        light: "#191D24"
        lightgray: "#242933"
        gray: "#2e3440"
        darkgray: "#d8dee9"
        dark: "#e5e9f0"
        secondary: "#d08770"
        tertiary: "#ebcb8b"
        highlight: rgba(88, 82, 96, 0.15)
        textHighlight: "#924f5888"
plugins:
  # - source:
  #     name: quartz-themes
  #     repo: "https://github.com/saberzero1/quartz-themes.git"
  #     subdir: plugin
  #   enabled: true
  #   options:
  #     theme: "base16"
  #     mode: both

  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10

  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: catppuccin-latte
        dark: catppuccin-mocha
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      comments: true
      highlight: true
      wikilinks: true
      callouts: true
      mermaid: true
      parseTags: true
      parseArrows: true
      parseBlockReferences: true
      enableInHtmlEmbed: false
      enableYouTubeEmbed: true
      enableVideoEmbed: true
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/obsidian-plugin-excalidraw
    enabled: true
    options:
      enableInteraction: true
      darkMode: auto
      exportPadding: 20
    order: 50
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40

  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
      openLinksInNewTab: true
    order: 60

  - source: github:quartz-community/description
    enabled: true
    order: 70

  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80

  - source: github:quartz-community/citations
    enabled: false
    order: 85
  - source: github:quartz-community/hard-line-breaks
    enabled: false
    order: 90

  - source: github:quartz-community/ox-hugo
    enabled: false
    order: 91
  - source: github:quartz-community/roam
    enabled: false
    order: 92

  - source: github:quartz-community/fonts
    enabled: true
  - source: github:quartz-community/remove-draft
    enabled: true

  - source: github:quartz-community/explicit-publish
    enabled: false
  - source: github:quartz-community/unlisted-pages
    enabled: true
    options: {}
    order: 45

  - source: github:quartz-community/encrypted-pages
    enabled: true
    options:
      iterations: 600000
      passwordField: password
      unlistWhenEncrypted: false
      outputPath: static/encryptedContentIndex.json

  - source: github:quartz-community/stacked-pages
    enabled: false
    layout:
      position: afterBody
      priority: 50
      display: all

  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true

  - source: github:quartz-community/graph
    enabled: true
    layout:
      position: right
      group: toolbar
      priority: 60

# Toolbar
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: right
      priority: 10
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: right
      priority: 20
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: right
      priority: 30
      group: toolbar

# Files
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 50
      display: desktop-only
  - source: github:quartz-community/explorer
    enabled: true
    layout:
      position: left
      priority: 50
      display: desktop-only
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 40
      display: desktop-only

  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/tag-list
    enabled: false
    layout:
      position: beforeBody
      priority: 30
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index

  - source: github:quartz-community/footer
    enabled: false
    options:
      links:
        GitHub: https://github.com/jackyzha0/quartz
        Discord Community: https://discord.gg/cRFFHYye7t

  - source: github:quartz-community/recent-notes
    enabled: false

  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only

  - source: github:quartz-community/bases-page
    enabled: true
    options: {}
    order: 50
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - description
        - tags
        - aliases
      excludedProperties: []
      hidePropertiesView: false
      delimiters: ---
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all


layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
    header:
      priority: 10
      direction: row
    topbar:
      priority: 15
      direction: row
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
